<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Noopur Kashyap — Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- CURSOR -->
<div class="cursor-dot"></div>
<div class="cursor-follower"></div>

<!-- STAMP -->
<div class="stamp-container">
  <svg viewBox="0 0 200 200" class="stamp-svg">
    <circle cx="100" cy="100" r="92" class="stamp-bg" />
    <circle cx="100" cy="100" r="92" class="stamp-ring" />
    <circle cx="100" cy="100" r="68" class="stamp-ring" />

    <path id="circlePath"
      d="M 100,100 m -80,0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0"
      fill="transparent" />

    <text>
      <textPath href="#circlePath" class="stamp-text">
        Illustration ★ Service Design ★ UX Design ★ Illustration ★ Service Design ★ UX Design ★
      </textPath>
    </text>
  </svg>
</div>

<!-- MAIN -->
<div class="scroll-area">

  <div class="sticky-frame">

    <!-- BIRD PATH -->
    <svg class="scroll-path" viewBox="0 0 1200 800" preserveAspectRatio="none">

  <path 
  id="birdPath"
  d="
  M 180 120
  C 340 60, 520 180, 640 120
  C 760 60, 900 180, 1020 120
  "
  class="path-line"
  fill="none"
/>


<text class="path-hint" dy="-8">
  <textPath href="#birdPath" startOffset="8%">
    No idea is a bad idea • Every fish moves differently when explored • Scroll & see
  </textPath>
</text>

      <image 
        href="images/bird.svg"
        width="50"
        height="50"
        id="bird"
      />

    </svg>

    <!-- HERO -->
    <main class="hero-content">

      <div class="hero-text">
        <p class="greeting">
          <span class="badge">नमस्ते</span>, I'm
        </p>

        <h1 class="hero-name">
          Noopur<br/>Kashyap
        </h1>

        <p class="hero-sub">
          UX Designer and Illustrator
        </p>
      </div>

      <div class="illustration-wrapper">
        <img src="images/hero_illustration.gif"
             class="hero-illustration"
             alt="UX Illustration">
      </div>

    </main>

    <!-- NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a href="about.html" class="nav-button">About</a>
        <a href="projects.html" class="nav-button">Projects</a>
        <a href="contact.html" class="nav-button">Contact</a>
      </div>
    </nav>

    <!-- SIGNATURE -->
    <div class="signature">
      © 2026 Noopur Kashyap
    </div>

  </div>
</div>

<!-- 🐟 FISH LAYER -->
<div class="fish-layer">

  <img src="images/fish.svg" class="fish fish-1" />
  <img src="images/fish.svg" class="fish fish-2" />
  <img src="images/fish.svg" class="fish fish-3" />
  <img src="images/fish.svg" class="fish fish-4" />
  <img src="images/fish.svg" class="fish fish-5" />
  <img src="images/fish.svg" class="fish fish-6" />

  <img src="images/fish.svg" class="fish fish-7" />
  <img src="images/fish.svg" class="fish fish-8" />
  <img src="images/fish.svg" class="fish fish-9" />
  <img src="images/fish.svg" class="fish fish-10" />
  <img src="images/fish.svg" class="fish fish-11" />
  <img src="images/fish.svg" class="fish fish-12" />

</div>

<!-- JS -->
<script src="js/main.js"></script>

</body>
</html>
