<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Noopur Kashyap — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="cursor-dot"></div>
  <div class="cursor-follower"></div>

  <div class="scroll-area">
    <div class="sticky-frame">
      
      <div class="watermark-track" id="marquee">
        <span>Design is about envisioning castles in the sky, with the purpose of grounding them to reality. &nbsp;</span>
        <span>Design is about envisioning castles in the sky, with the purpose of grounding them to reality. &nbsp;</span>
      </div>

      <main class="hero-content">
        <div class="hero-left">
          <p class="greeting"><span class="badge">नमस्ते</span>, I'm</p>
          <h1 class="hero-name">Noopur<br/>Kashyap</h1>
          <p class="hero-sub">UX Designer and Illustrator</p>
        </div>
        <div class="hero-right">
          <img src="images/hero_illustration.gif" class="hero-illustration" alt="UX Illustration">
        </div>
      </main>

      <nav class="bottom-nav">
        <div class="nav-group">
          <a href="about.html" class="nav-button">About</a>
          <a href="projects.html" class="nav-button">Projects</a>
          <a href="contact.html" class="nav-button">Contact</a>
        </div>
      </nav>

      <div class="signature">© 2026 Noopur Kashyap</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const marquee = document.getElementById('marquee');
      const cursorDot = document.querySelector('.cursor-dot');
      const cursorFollower = document.querySelector('.cursor-follower');

      // 1. SCROLLING MARQUEE
      window.addEventListener('scroll', () => {
        const scrollAmount = window.scrollY * 0.2; 
        if (marquee) marquee.style.transform = `translateX(-${scrollAmount % 50}%)`;
      });

      // 2. CURSOR LOGIC
      if (cursorDot && cursorFollower && window.matchMedia("(pointer: fine)").matches) {
        let mouseX = -100, mouseY = -100; // Start off-screen
        let followerX = -100, followerY = -100;

        window.addEventListener('mousemove', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
          // Immediate movement for the dot
          cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;
        });

        function animateFollower() {
          // Smooth easing math
          followerX += (mouseX - followerX) * 0.15;
          followerY += (mouseY - followerY) * 0.15;
          cursorFollower.style.transform = `translate3d(${followerX}px, ${followerY}px, 0)`;
          requestAnimationFrame(animateFollower);
        }
        animateFollower();

        // Hover Detection
        const interactives = document.querySelectorAll('a, .nav-button');
        interactives.forEach(el => {
          el.addEventListener('mouseenter', () => cursorFollower.classList.add('hover-active'));
          el.addEventListener('mouseleave', () => cursorFollower.classList.remove('hover-active'));
        });
      }
    });
  </script>
</body>
</html>
